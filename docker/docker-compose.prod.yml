name: wrap

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: spotify
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: spotify_intelligence
      TZ: UTC
      PGTZ: UTC
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spotify -d spotify_intelligence"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No port exposure — internal only
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # No port exposure — internal only
    networks:
      - app-network

  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend.Dockerfile
    ports:
      - "8001:8001"
    env_file: ../.env.production
    environment:
      - DATABASE_URL=postgresql+asyncpg://spotify:${POSTGRES_PASSWORD}@postgres:5432/spotify_intelligence
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=production
    # Single worker until APScheduler is moved to dedicated process (avoids duplicate jobs)
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --workers 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - app-network

  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend.Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network

  # Caddy reverse proxy — Phase 6
  # caddy:
  #   image: caddy:2-alpine
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./Caddyfile:/etc/caddy/Caddyfile
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   depends_on:
  #     - frontend
  #     - backend
  #   networks:
  #     - app-network

volumes:
  pgdata:
  redisdata:
  # caddy_data:
  # caddy_config:

networks:
  app-network:
    driver: bridge
