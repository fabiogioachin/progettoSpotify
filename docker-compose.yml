services:
  backend:
    build: ./backend
    ports:
      - "8001:8001"
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./backend/app:/app/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped
